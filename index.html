<script type="text/babel">

// ============================================================
// CONFIGURATION
// ============================================================
const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/XXXXXXXX"; // ← ton webhook
// ============================================================

// 🔒 Neutralisé pour éviter crash Airtable
const fetchPubs = async function() {
  return;
};

// 🔒 Patch corrigé (plus d'erreur JS)
const patch = async function(id, fields) {
  try {
    await fetch(MAKE_WEBHOOK_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        action: "update",
        id: id,
        fields: fields
      })
    });
  } catch (e) {
    console.error(e);
  }
};

// 🔒 Delete corrigé
const deleteRecord = async function(id) {
  try {
    await fetch(MAKE_WEBHOOK_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        action: "delete",
        id: id
      })
    });
  } catch (e) {
    console.error(e);
  }
};

// ============================================================
// TON APP (INCHANGÉE)
// ============================================================

function App() {

  const [form, setForm] = React.useState({
    sujet: "",
    type: "",
    details: "",
    plateformes: []
  });

  const [loading, setLoading] = React.useState(false);

  // 🔒 désactive le fetch initial qui faisait planter
  React.useEffect(function() {}, []);

  const togglePlatform = function(p) {
    setForm(function(f) {
      return {
        ...f,
        plateformes: f.plateformes.includes(p)
          ? f.plateformes.filter(x => x !== p)
          : [...f.plateformes, p]
      };
    });
  };

  const handleSubmit = async function() {

    if (!form.sujet || !form.type || form.plateformes.length === 0) {
      alert("Remplis les champs obligatoires");
      return;
    }

    if (loading) return;
    setLoading(true);

    try {

      await fetch(MAKE_WEBHOOK_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          action: "create",
          ...form
        })
      });

      alert("✅ Envoyé");

      setForm({
        sujet: "",
        type: "",
        details: "",
        plateformes: []
      });

    } catch (e) {
      console.error(e);
      alert("Erreur");
    }

    setLoading(false);
  };

  return (
    <div style={{ maxWidth: "700px", margin: "40px auto", padding: "20px" }}>

      <h2 style={{ color: "#FFE000" }}>Créer une publication</h2>

      <input
        placeholder="Sujet du post"
        value={form.sujet}
        onChange={e => setForm({ ...form, sujet: e.target.value })}
      />

      <input
        placeholder="Type de contenu"
        value={form.type}
        onChange={e => setForm({ ...form, type: e.target.value })}
      />

      <textarea
        placeholder="Détails supplémentaires"
        value={form.details}
        onChange={e => setForm({ ...form, details: e.target.value })}
      />

      <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", marginBottom: "15px" }}>
        {["Facebook", "Instagram", "TikTok", "Affichage Dynamique"].map(p => (
          <button
            key={p}
            onClick={() => togglePlatform(p)}
            style={{
              padding: "8px 14px",
              borderRadius: "20px",
              border: form.plateformes.includes(p)
                ? "1px solid #FFE000"
                : "1px solid rgba(255,224,0,0.2)",
              background: form.plateformes.includes(p)
                ? "rgba(255,224,0,0.15)"
                : "transparent",
              color: "#fff"
            }}
          >
            {p}
          </button>
        ))}
      </div>

      <button onClick={handleSubmit} disabled={loading}>
        {loading ? "..." : "Envoyer"}
      </button>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
