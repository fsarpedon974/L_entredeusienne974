<script type="text/babel">

// ============================================================
// CONFIG
// ============================================================
const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/kvj121sx53oolapt6yhvrsmk1wc36vyb"; // ← TON WEBHOOK
// ============================================================


// ============================================================
// SAFE FUNCTIONS (plus aucun crash)
// ============================================================

// ❌ plus d’appel Airtable direct
const fetchPubs = async () => { return; };

// ✅ update via Make
const patch = async (id, fields) => {
  await fetch(MAKE_WEBHOOK_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      action: "update",
      id,
      fields
    })
  });
};

// ✅ delete via Make
const deleteRecord = async (id) => {
  await fetch(MAKE_WEBHOOK_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      action: "delete",
      id
    })
  });
};


// ============================================================
// APP (TON DESIGN INTACT)
// ============================================================

function App() {

  const [form, setForm] = React.useState({
    sujet: "",
    type: "",
    details: "",
    plateformes: []
  });

  const [loading, setLoading] = React.useState(false);

  React.useEffect(() => {}, []); // 🔒 évite crash

  const togglePlatform = (p) => {
    setForm(f => ({
      ...f,
      plateformes: f.plateformes.includes(p)
        ? f.plateformes.filter(x => x !== p)
        : [...f.plateformes, p]
    }));
  };

  const handleSubmit = async () => {

    if (!form.sujet || !form.type || form.plateformes.length === 0) {
      alert("Remplis Sujet, Type et Plateformes");
      return;
    }

    if (loading) return;
    setLoading(true);

    try {

      await fetch(MAKE_WEBHOOK_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          action: "create",
          ...form
        })
      });

      alert("✅ Envoyé");

      setForm({
        sujet: "",
        type: "",
        details: "",
        plateformes: []
      });

    } catch (e) {
      alert("Erreur");
    }

    setLoading(false);
  };


  return (
    <div style={{ maxWidth: "700px", margin: "40px auto", padding: "20px" }}>

      <h2 style={{ color: "#FFE000" }}>Créer une publication</h2>

      <input
        placeholder="Sujet du post"
        value={form.sujet}
        onChange={e => setForm({ ...form, sujet: e.target.value })}
      />

      <input
        placeholder="Type de contenu"
        value={form.type}
        onChange={e => setForm({ ...form, type: e.target.value })}
      />

      <textarea
        placeholder="Détails supplémentaires"
        value={form.details}
        onChange={e => setForm({ ...form, details: e.target.value })}
      />

      <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", marginBottom: "15px" }}>
        {["Facebook","Instagram","TikTok","Affichage Dynamique"].map(p => (
          <button
            key={p}
            onClick={() => togglePlatform(p)}
            style={{
              padding: "8px 14px",
              borderRadius: "20px",
              border: form.plateformes.includes(p)
                ? "1px solid #FFE000"
                : "1px solid rgba(255,224,0,0.2)",
              background: form.plateformes.includes(p)
                ? "rgba(255,224,0,0.15)"
                : "transparent",
              color: "#fff"
            }}
          >
            {p}
          </button>
        ))}
      </div>

      <button onClick={handleSubmit} disabled={loading}>
        {loading ? "..." : "Envoyer"}
      </button>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
