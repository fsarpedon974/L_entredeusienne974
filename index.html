<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L'Entredeusienne — Gestion publications</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    body { background:#0F0700; font-family:Georgia,serif; color:#fff; }
    input, textarea, select {
      background: rgba(255,255,255,0.06);
      border:1px solid rgba(255,224,0,0.15);
      border-radius:9px;
      color:#fff;
      padding:10px;
      width:100%;
    }
    label { color:rgba(255,224,0,0.6); font-size:11px; margin-bottom:5px; display:block; }
    button { cursor:pointer; }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

// ============================================================
// CONFIG
// ============================================================
const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/XXXXXXXXXXXX";
// ============================================================

const PLATFORMS_OPTIONS = ["Facebook","Instagram","TikTok","Affichage Dynamique"];

function App(){

  const [form,setForm] = React.useState({
    sujet:"",
    type:"",
    details:"",
    intention:"",
    plateformes:[],
    date:"",
    bypass:false
  });

  const [loading,setLoading] = React.useState(false);

  const togglePlatform = (p)=>{
    setForm(f=>({
      ...f,
      plateformes: f.plateformes.includes(p)
        ? f.plateformes.filter(x=>x!==p)
        : [...f.plateformes,p]
    }));
  };

  const handleSubmit = async ()=>{

    if(!form.sujet || !form.type || form.plateformes.length===0){
      alert("Champs obligatoires manquants");
      return;
    }

    if(loading) return;
    setLoading(true);

    try{

      const payload = {
        sujet: form.sujet,
        type: form.type,
        plateformes: form.plateformes,
        statut: "🆕 Nouveau",
        mode: "normal",
        bypass: form.bypass,
        details: form.details || "",
        intention: form.intention || "",
        date: form.date || ""
      };

      const res = await fetch(MAKE_WEBHOOK_URL,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(payload)
      });

      if(!res.ok) throw new Error("Erreur serveur");

      alert("✅ Envoyé !");
      setForm({
        sujet:"",
        type:"",
        details:"",
        intention:"",
        plateformes:[],
        date:"",
        bypass:false
      });

    }catch(e){
      console.error(e);
      alert("Erreur : "+e.message);
    }

    setLoading(false);
  };

  return(
    <div style={{maxWidth:"600px",margin:"40px auto",padding:"20px"}}>

      <h2 style={{color:"#FFE000"}}>Nouvelle publication</h2>

      <label>Sujet *</label>
      <input value={form.sujet} onChange={e=>setForm({...form,sujet:e.target.value})}/>

      <label>Type *</label>
      <input value={form.type} onChange={e=>setForm({...form,type:e.target.value})}/>

      <label>Détails</label>
      <textarea value={form.details} onChange={e=>setForm({...form,details:e.target.value})}/>

      <label>Intention</label>
      <input value={form.intention} onChange={e=>setForm({...form,intention:e.target.value})}/>

      <label>Plateformes *</label>
      <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
        {PLATFORMS_OPTIONS.map(p=>(
          <button
            key={p}
            onClick={()=>togglePlatform(p)}
            style={{
              padding:"8px 12px",
              borderRadius:"20px",
              border: form.plateformes.includes(p) ? "1px solid #FFE000" : "1px solid #555",
              background: form.plateformes.includes(p) ? "#FFE00022" : "transparent",
              color:"#fff"
            }}
          >
            {p}
          </button>
        ))}
      </div>

      <br/>

      <button onClick={handleSubmit} disabled={loading}
        style={{
          width:"100%",
          padding:"14px",
          background:"#FFE000",
          color:"#000",
          fontWeight:"bold",
          border:"none",
          borderRadius:"10px"
        }}>
        {loading ? "Envoi..." : "Envoyer"}
      </button>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
